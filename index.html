<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12Min Eccentric Quest</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: #fce4ec;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }
    .app-container {
        width: 100%;
        max-width: 400px;
        height: 100vh;
        max-height: 800px;
        background-color: #ffffff;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .header {
        background-color: #8d6e63;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
        border-bottom: 4px solid #5d4037;
    }
    .content {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        background-image: radial-gradient(#fff9c4 10%, transparent 10%), radial-gradient(#fff9c4 10%, transparent 10%);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
    }
    /* ホーム画面 */
    #home-screen {
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    .cat-icon {
        font-size: 60px;
        text-align: center;
        margin-bottom: 10px;
        animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
    .status-box {
        background-color: #ffffff;
        border: 4px solid #8d6e63;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 20px;
        box-shadow: 4px 4px 0 #d7ccc8;
    }
    .level {
        font-size: 24px;
        font-weight: bold;
        color: #e53935;
        text-align: center;
        margin-bottom: 10px;
    }
    .stats {
        display: flex;
        justify-content: space-around;
        font-size: 14px;
        font-weight: bold;
        color: #555;
    }
    .stats div {
        text-align: center;
    }
    .stats span {
        display: block;
        font-size: 18px;
        color: #43a047;
    }
    .chart-container {
        background-color: #ffffff;
        border: 4px solid #8d6e63;
        border-radius: 10px;
        padding: 15px;
        flex-grow: 1;
        position: relative;
        margin-bottom: 20px;
        box-shadow: 4px 4px 0 #d7ccc8;
    }
    .chart-title {
        font-weight: bold;
        color: #555;
        margin-bottom: 20px;
        text-align: center;
    }
    .bars {
        display: flex;
        align-items: flex-end;
        justify-content: space-around;
        height: 120px;
        padding-bottom: 10px;
        border-bottom: 2px solid #eee;
    }
    .bar {
        width: 30px;
        background-color: #ef5350;
        border-radius: 5px 5px 0 0;
        transition: height 1s ease-out;
    }
    .btn {
        background-color: #ef5350;
        color: white;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        padding: 15px;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 6px 0 #b71c1c;
        transition: all 0.1s;
        user-select: none;
    }
    .btn:active {
        transform: translateY(6px);
        box-shadow: none;
    }

    /* トレーニング画面 */
    #workout-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        height: 100%;
        text-align: center;
    }
    .speech-bubble {
        background-color: #ffffff;
        border: 4px solid #8d6e63;
        border-radius: 15px;
        padding: 15px;
        margin: 20px;
        font-size: 18px;
        font-weight: bold;
        color: #333;
        position: relative;
        width: 80%;
        box-shadow: 4px 4px 0 #d7ccc8;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .speech-bubble::after {
        content: '';
        position: absolute;
        top: -15px;
        left: 50%;
        margin-left: -10px;
        border-width: 0 10px 15px 10px;
        border-style: solid;
        border-color: transparent transparent #8d6e63 transparent;
    }
    .timer-circle {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background-color: #fff;
        border: 8px solid #ef5350;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        font-weight: bold;
        color: #ef5350;
        margin-top: 30px;
        box-shadow: 0 0 20px rgba(239, 83, 80, 0.3);
    }
    .perfect-effect {
        position: absolute;
        top: 50%;
        font-size: 45px;
        font-weight: bold;
        color: #ffd700;
        text-shadow: 3px 3px 0 #ff5252, -2px -2px 0 #fff;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        pointer-events: none;
    }
    .show-perfect {
        opacity: 1;
        transform: scale(1.2) rotate(-5deg);
    }
</style>
</head>
<body>

<div class="app-container">
    <div class="header">
        12Min Eccentric Quest
    </div>
    <div class="content">
        
        <div id="home-screen">
            <div class="cat-icon">🐈🐾</div>
            <div class="status-box">
                <div class="level" id="user-level">Lv. 12 見習い魔法使い</div>
                <div class="stats">
                    <div>バランス<span>S ランク</span></div>
                    <div>神経適応<span>75 %</span></div>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">📈 筋力成長トレンド</div>
                <div class="bars">
                    <div class="bar" style="height: 30px;"></div>
                    <div class="bar" style="height: 50px;"></div>
                    <div class="bar" style="height: 70px;"></div>
                    <div class="bar" style="height: 90px;"></div>
                    <div class="bar" style="height: 100px;"></div>
                    <div class="bar" style="height: 120px; background-color: #ffb74d;"></div>
                </div>
            </div>

            <div class="btn" onclick="startWorkout()">
                今週の冒険へ出発ニャ
            </div>
        </div>

        <div id="workout-screen">
            <div class="cat-icon" id="cat-face" style="margin-top: 20px;">🐈</div>
            <div class="speech-bubble" id="cat-speech">
                魔法の詠唱のように、<br>息を吐きながら下ろすニャ〜
            </div>
            
            <div class="timer-circle" id="timer">
                4
            </div>

            <div class="perfect-effect" id="perfect-text">PERFECT!!✨</div>

            <div class="btn" id="finish-btn" style="margin-top: auto; display: none; width: 80%;" onclick="finishWorkout()">
                クエスト完了ニャ！
            </div>
        </div>

    </div>
</div>

<script>
    let level = 12;

    function startWorkout() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('workout-screen').style.display = 'flex';
        document.getElementById('finish-btn').style.display = 'none';
        document.getElementById('perfect-text').classList.remove('show-perfect');
        document.getElementById('cat-face').innerText = '🐈💦';
        
        let speech = document.getElementById('cat-speech');
        let timer = document.getElementById('timer');
        
        speech.innerHTML = "椅子に向かって、4秒かけて<br>ゆっくり下ろすニャ〜";
        
        let count = 4;
        timer.innerText = count;

        let interval = setInterval(() => {
            count--;
            if (count > 0) {
                timer.innerText = count;
            } else {
                clearInterval(interval);
                timer.innerText = "0";
                showPerfect();
            }
        }, 1000);
    }

    function showPerfect() {
        let speech = document.getElementById('cat-speech');
        document.getElementById('cat-face').innerText = '😻✨';
        speech.innerHTML = "そのペースだニャ！<br>フォームばっちりニャ！";
        
        let perfect = document.getElementById('perfect-text');
        perfect.classList.add('show-perfect');

        setTimeout(() => {
            document.getElementById('finish-btn').style.display = 'block';
        }, 1500);
    }

    function finishWorkout() {
        level++;
        document.getElementById('user-level').innerText = "Lv. " + level + " 駆け出しの戦士";
        document.getElementById('workout-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'flex';
        alert("🎉 レベルアップしたニャ！\n称号が「駆け出しの戦士」になったニャ！\n\n今週のトレーニング完了です！");
    }
</script>

</body>
</html>
